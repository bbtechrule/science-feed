<!DOCTYPE html>
<html>
<head>
  <title>Science Feed</title>

  <!-- IMPORTANT: Mobile view -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: black;
      color: white;
      touch-action: none;
    }

    .post {
      height: 100vh;
      width: 100%;
      position: absolute;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: transform 0.35s ease;
    }

    img {
      width: 100%;
      max-height: 70vh;
      object-fit: cover;
    }

    h2 {
      margin: 10px 0 5px;
    }

    p {
      margin: 0 15px;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="feed"></div>

<script>
const posts = [
  {id:1,img:"https://via.placeholder.com/400",title:"Photosynthesis 🌱",desc:"Plants make food"},
  {id:2,img:"https://via.placeholder.com/400",title:"Brain 🧠",desc:"Controls body"},
  {id:3,img:"https://via.placeholder.com/400",title:"DNA 🧬",desc:"Genetic info"},
  {id:4,img:"https://via.placeholder.com/400",title:"Gravity 🌍",desc:"Pull force"},
  {id:5,img:"https://via.placeholder.com/400",title:"Atoms ⚛️",desc:"Basic unit"},
  {id:6,img:"https://via.placeholder.com/400",title:"Solar System ☀️",desc:"Planets orbit sun"},
  {id:7,img:"https://via.placeholder.com/400",title:"Water Cycle 💧",desc:"Rain process"},
  {id:8,img:"https://via.placeholder.com/400",title:"Electricity ⚡",desc:"Energy flow"},
  {id:9,img:"https://via.placeholder.com/400",title:"Cells 🔬",desc:"Unit of life"},
  {id:10,img:"https://via.placeholder.com/400",title:"Evolution 🧬",desc:"Species change"}
];

let currentIndex = localStorage.getItem("currentIndex") || 0;
currentIndex = parseInt(currentIndex);

const feed = document.getElementById("feed");

function renderPosts() {
  feed.innerHTML = "";

  posts.forEach((post, index) => {
    let div = document.createElement("div");
    div.className = "post";

    let offset = index - currentIndex;
    div.style.transform = `translateY(${offset * 100}vh)`;

    div.innerHTML = `
      <img src="${post.img}">
      <h2>${post.title}</h2>
      <p>${post.desc}</p>
    `;

    feed.appendChild(div);
  });
}

renderPosts();

// Swipe logic
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;
  let diff = startY - endY;

  if (diff > 50 && currentIndex < posts.length - 1) {
    currentIndex++; // swipe up
  } 
  else if (diff < -50 && currentIndex > 0) {
    currentIndex--; // swipe down
  }

  localStorage.setItem("currentIndex", currentIndex);
  renderPosts();
});
</script>

</body>
</html>
