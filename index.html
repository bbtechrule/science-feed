<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insta UI</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
    }

    /* TOP HEADING */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 18px;
      padding: 10px 0;
      background: rgba(0,0,0,0.6);
      z-index: 10;
    }

    /* MAIN APP */
    .app {
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 50px;   /* space for header */
      padding-bottom: 20px; /* bottom gap */
      box-sizing: border-box;
    }

    .post {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .post-img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 🔥 THIS FIXES YOUR ISSUE */
    }

    /* LEFT BUTTONS */
    .left-buttons {
      position: absolute;
      left: 10px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    button {
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      font-size: 20px;
      padding: 12px;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<!-- 🔝 HEADER -->
<div class="header">zerotoin.com</div>

<div class="app">
  <div class="post">
    
    <!-- 🔴 Replace with your Cloudinary image -->
    <img src="https://res.cloudinary.com/demo/image/upload/sample.jpg" class="post-img">

    <div class="left-buttons">
      <button id="like">❤️</button>
      <button id="share">🔗</button>
    </div>

  </div>
</div>

<script>
  const likeBtn = document.getElementById("like");
  const shareBtn = document.getElementById("share");

  let liked = false;

  likeBtn.onclick = () => {
    liked = !liked;
    likeBtn.innerHTML = liked ? "💖" : "❤️";
  };

  shareBtn.onclick = () => {
    if (navigator.share) {
      navigator.share({
        title: "Check this",
        url: window.location.href
      });
    } else {
      alert("Share not supported");
    }
  };
</script>

</body>
</html>
