<!DOCTYPE html>
<html>
<head>
  <title>zerotoin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
      display: flex;
      justify-content: center;
    }

    /* App container */
    .app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      position: relative;
    }

    /* Desktop mode */
    @media (min-width: 768px) {
      .app {
        border: 2px solid #333;
        border-radius: 10px;
      }
    }

    /* Each post */
    .post {
      height: 100vh;
      position: relative;
      scroll-snap-align: start;
    }

    /* Image full screen */
    .post img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      max-width: 420px;
      padding: 12px;
      color: white;
      font-size: 22px;
      font-weight: bold;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }

  </style>
</head>

<body>

<div class="app">

  <div class="header">zerotoin</div>

  <div id="feed"></div>

</div>

<script src="images.js"></script>

<script>
  const feed = document.getElementById("feed");

  if (typeof posts === "undefined" || posts.length === 0) {
    feed.innerHTML = "<h2 style='color:white;text-align:center'>No images</h2>";
  } else {
    posts.forEach(url => {
      const div = document.createElement("div");
      div.className = "post";

      div.innerHTML = `<img src="${url}" />`;

      feed.appendChild(div);
    });
  }
</script>

</body>
</html>
