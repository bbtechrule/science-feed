<!DOCTYPE html>
<html>
<head>
  <title>Science Feed</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial;
      color: white;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 50px;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      padding-left: 15px;
      z-index: 10;
    }

    /* Fullscreen post */
    .post {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100vh;
      transition: transform 0.4s ease;
    }

    img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    /* Text overlay */
    .overlay {
      position: absolute;
      bottom: 20px;
      left: 15px;
      right: 15px;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 8px;
    }

    h3 { margin: 0; }
    p { margin: 5px 0 0; font-size: 14px; }
  </style>
</head>

<body>

<div class="header">🔬 Science Feed</div>

<div id="feed"></div>

<!-- ✅ Load images from separate file -->
<script src="images.js"></script>

<script>
let currentIndex = localStorage.getItem("currentIndex") || 0;
currentIndex = parseInt(currentIndex);

const feed = document.getElementById("feed");

function renderPosts() {
  feed.innerHTML = "";

  posts.forEach((post, index) => {
    let div = document.createElement("div");
    div.className = "post";

    let offset = index - currentIndex;
    div.style.transform = `translateY(${offset * 100}vh)`;

    div.innerHTML = `
      <img src="${post.img}">
      <div class="overlay">
        <h3>${post.title}</h3>
        <p>${post.desc}</p>
      </div>
    `;

    feed.appendChild(div);
  });
}

renderPosts();

// Swipe system
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;
  let diff = startY - endY;

  if (diff > 50 && currentIndex < posts.length - 1) {
    currentIndex++;
  } 
  else if (diff < -50 && currentIndex > 0) {
    currentIndex--;
  }

  localStorage.setItem("currentIndex", currentIndex);
  renderPosts();
});
</script>

</body>
</html>
