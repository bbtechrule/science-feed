<!DOCTYPE html>
<html>
<head>
  <title>Science Feed</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      overflow: hidden;
      background: black;
      color: white;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 50px;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      padding-left: 15px;
      z-index: 10;
    }

    /* Post */
    .post {
      position: absolute;
      top: 0;
      height: 100vh;
      width: 100%;
      transition: transform 0.4s ease;
    }

    img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }

    /* Text overlay */
    .overlay {
      position: absolute;
      bottom: 20px;
      left: 15px;
      right: 15px;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 8px;
    }

    h3 {
      margin: 0 0 5px;
    }

    p {
      margin: 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">🔬 Science Feed</div>

<div id="feed"></div>

<script>
const posts = [
  {id:1,img:"https://via.placeholder.com/600x900",title:"Photosynthesis 🌱",desc:"Plants use sunlight to make food."},
  {id:2,img:"https://via.placeholder.com/600x900",title:"Human Brain 🧠",desc:"Controls all body functions."},
  {id:3,img:"https://via.placeholder.com/600x900",title:"DNA 🧬",desc:"Carries genetic information."},
  {id:4,img:"https://via.placeholder.com/600x900",title:"Gravity 🌍",desc:"Force that pulls objects."},
  {id:5,img:"https://via.placeholder.com/600x900",title:"Atoms ⚛️",desc:"Basic unit of matter."},
  {id:6,img:"https://via.placeholder.com/600x900",title:"Solar System ☀️",desc:"Planets orbit the Sun."},
  {id:7,img:"https://via.placeholder.com/600x900",title:"Water Cycle 💧",desc:"Evaporation and rain."},
  {id:8,img:"https://via.placeholder.com/600x900",title:"Electricity ⚡",desc:"Flow of charge."},
  {id:9,img:"https://via.placeholder.com/600x900",title:"Cells 🔬",desc:"Basic unit of life."},
  {id:10,img:"https://via.placeholder.com/600x900",title:"Evolution 🧬",desc:"Species change over time."}
];

let currentIndex = localStorage.getItem("currentIndex") || 0;
currentIndex = parseInt(currentIndex);

const feed = document.getElementById("feed");

function renderPosts() {
  feed.innerHTML = "";

  posts.forEach((post, index) => {
    let div = document.createElement("div");
    div.className = "post";

    let offset = index - currentIndex;
    div.style.transform = `translateY(${offset * 100}vh)`;

    div.innerHTML = `
      <img src="${post.img}">
      <div class="overlay">
        <h3>${post.title}</h3>
        <p>${post.desc}</p>
      </div>
    `;

    feed.appendChild(div);
  });
}

renderPosts();

// Swipe
let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;
  let diff = startY - endY;

  if (diff > 50 && currentIndex < posts.length - 1) {
    currentIndex++;
  } 
  else if (diff < -50 && currentIndex > 0) {
    currentIndex--;
  }

  localStorage.setItem("currentIndex", currentIndex);
  renderPosts();
});
</script>

</body>
</html>
