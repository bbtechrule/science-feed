<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>StudentGPT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      background-color: #000;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .header {
      background-color: #007bff;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 80%;
      padding: 12px;
      border-radius: 16px;
      word-wrap: break-word;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background-color: #444;
    }

    .bot {
      align-self: flex-start;
      background-color: #3333aa;
    }

    .input-bar {
      display: flex;
      align-items: center;
      padding: 12px;
      background-color: #0d0d0d;
      border-top: 1px solid #333;
    }

    .input-bar textarea {
      flex: 1;
      min-height: 42px;
      max-height: 110px;
      resize: none;
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 16px;
      background-color: #1e1e1e;
      color: white;
      overflow-y: auto;
      line-height: 1.4;
    }

    .input-bar textarea:focus {
      outline: none;
    }

    .input-bar button {
      margin-left: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
    }

    .input-bar button:active {
      background-color: #0056b3;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="header">
      <div class="title">StudentGPT</div>
      <button onclick="clearChat()">New Chat</button>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-bar">
      <textarea id="userInput" rows="1" placeholder="Ask anything..."></textarea>
      <button onclick="sendMessage()">Upload</button>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const input = document.getElementById('userInput');

    function sendMessage() {
      const message = input.value.trim();
      if (message === "") return;
      const userBubble = document.createElement('div');
      userBubble.className = 'bubble user';
      userBubble.textContent = message;
      chatArea.appendChild(userBubble);
      scrollToBottom();
      input.value = "";
      input.style.height = '42px';
      const botBubble = document.createElement('div');
      botBubble.className = 'bubble bot';
      chatArea.appendChild(botBubble);
      const botText = "This is your answer for: " + message;
      let index = 0;
      const typingInterval = setInterval(() => {
        botBubble.textContent += botText.charAt(index);
        index++;
        scrollToBottom();
        if (index >= botText.length) clearInterval(typingInterval);
      }, 30);
    }

    function clearChat() {
      chatArea.innerHTML = "";
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }
    // Auto-grow input textarea up to 5 lines
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 110) + 'px';
    });
  </script>
</body>

</html>
